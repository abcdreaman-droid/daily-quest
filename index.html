<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Quest</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:      #F9F9F9;
  --bg2:     #FFFFFF;
  --bg3:     #F2F2F2;
  --ink:     #111111;
  --ink2:    #444444;
  --ink3:    #999999;
  --ink4:    #CCCCCC;
  --line:    rgba(0,0,0,0.08);
  --line2:   rgba(0,0,0,0.05);
  --black:   #111111;
  --white:   #FFFFFF;

  /* slot accent — all black/gray */
  --c0: #888888;
  --c1: #111111;
  --c2: #555555;
  --c3: #111111;
  --c4: #888888;
  --c5: #333333;

  --radius: 10px;
}

html { background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
.nav {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid var(--line2);
}

.wordmark {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--black);
  padding: 14px 0;
  white-space: nowrap;
}

.nav-bottom {
  display: flex;
  align-items: center;
  padding: 0 32px;
}

.nav-tabs {
  display: flex;
  align-items: center;
  gap: 0;
}

.nav-tab {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--black); border-bottom-color: var(--black); font-weight: 600; }

.nav-right {
  display: flex; align-items: center; gap: 8px;
}

.nav-btn-pill {
  background: none; border: 1px solid var(--line);
  border-radius: 20px; padding: 5px 14px; font-size: 11px;
  color: var(--ink3); cursor: pointer; transition: all 0.2s;
}
.nav-btn-pill:hover { border-color: var(--ink2); color: var(--ink); }

.nav-week {
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-left: 1px solid var(--line);
  border-right: 1px solid var(--line);
  margin: 0 8px;
}
.nav-week-lbl { font-size: 12px; color: var(--ink2); min-width: 130px; text-align: center; }
.nav-arrow {
  background: none; border: 1px solid var(--line); color: var(--ink3);
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.nav-arrow:hover { border-color: var(--ink); color: var(--ink); }

/* ═══════════════════════════════════════
   PAGES
═══════════════════════════════════════ */
.page { display: none; }
.page.active { display: block; }

/* ═══════════════════════════════════════
   STATS BAR
═══════════════════════════════════════ */
.stats-bar {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 16px 32px;
  background: var(--white);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.rings-row {
  display: flex;
  align-items: center;
  gap: 32px;
}

.ring-item {
  display: flex; align-items: center; gap: 12px;
}

.ring-svg-wrap {
  position: relative; width: 52px; height: 52px;
}
.ring-svg-wrap svg {
  width: 52px; height: 52px;
  transform: rotate(-90deg);
}
.ring-track { fill: none; stroke: var(--bg3); stroke-width: 4; }
.ring-fill  { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1); }
.ring-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--ink);
}

.ring-info { display: flex; flex-direction: column; gap: 2px; }
.ring-num  { font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1; }
.ring-sub  { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; }

.stats-divider { width: 1px; height: 36px; background: var(--line); margin: 0 4px; }

/* ═══════════════════════════════════════
   PLANNER GRID
═══════════════════════════════════════ */
.planner { padding: 20px 32px 48px; }

.day-header-row {
  display: grid;
  grid-template-columns: 48px repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 5px;
}
.dh-spacer {}
.day-head {
  padding: 8px 6px 6px;
  text-align: center;
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--line2);
}
.day-wd   { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); }
.day-num  { font-size: 20px; font-weight: 700; color: var(--ink2); line-height: 1.2; }
.day-head.is-today { border-color: var(--black); }
.day-head.is-today .day-wd  { color: var(--black); }
.day-head.is-today .day-num { color: var(--black); }
.today-pip { width: 4px; height: 4px; border-radius: 50%; background: var(--black); margin: 3px auto 0; }

.main-grid {
  display: grid;
  grid-template-columns: 48px repeat(7, 1fr);
  gap: 5px;
}

/* row label */
.row-lbl {
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  padding-right: 8px; gap: 1px;
}
.rl-name { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink3); text-align: right; line-height: 1.5; }
.rl-time { font-size: 9px; color: var(--ink4); text-align: right; margin-top: 2px; }

/* block card */
.block {
  min-height: 110px;
  background: var(--white);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  padding: 8px 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.block::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: var(--radius) var(--radius) 0 0;
  transition: opacity 0.2s;
  opacity: 0;
}
.block[data-si="0"]::before { background: var(--c0); }
.block[data-si="1"]::before { background: var(--c1); }
.block[data-si="2"]::before { background: var(--c2); }
.block[data-si="3"]::before { background: var(--c3); }
.block[data-si="4"]::before { background: var(--c4); }
.block[data-si="5"]::before { background: var(--c5); }

.block.filled::before { opacity: 1; }
.block.today-col { border-color: rgba(0,0,0,0.18); }
.block:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.16); }
.block:hover::before { opacity: 1; }

.b-tasks { display: flex; flex-direction: column; gap: 4px; }
.b-task  { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; font-weight: 500; color: #444; line-height: 1.4; }
.b-chk {
  width: 13px; height: 13px; border: 2px solid #BBB; border-radius: 2px;
  flex-shrink: 0; margin-top: 1px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.b-chk:hover { border-color: #555; }
.b-chk.done { background: #BBB; border-color: #BBB; }
.b-chk.done::after { content: '✓'; font-size: 9px; color: #fff; }
.b-txt { transition: all 0.2s; }
.b-txt.done { text-decoration: line-through; color: #CCC; font-weight: 400; }
.b-note { font-size: 10px; color: var(--ink3); font-style: italic; margin-top: 3px; line-height: 1.4; }
.b-more { font-size: 10px; color: var(--ink4); margin-top: 2px; }
.b-empty { font-size: 10px; color: var(--ink4); opacity: 0; transition: opacity 0.2s; }
.block:hover .b-empty { opacity: 1; }

/* ═══════════════════════════════════════
   BLOCK MODAL
═══════════════════════════════════════ */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  z-index: 500; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 16px;
  width: 460px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: popIn 0.22s cubic-bezier(0.2,0,0,1);
}
@keyframes popIn {
  from { opacity:0; transform: translateY(16px) scale(0.97); }
  to   { opacity:1; transform: none; }
}

.m-top {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--line2);
  display: flex; align-items: flex-start; justify-content: space-between;
}
.m-slot-bar { width: 24px; height: 3px; border-radius: 2px; margin-bottom: 8px; }
.m-title { font-size: 17px; font-weight: 700; color: var(--ink); }
.m-sub   { font-size: 12px; color: var(--ink3); margin-top: 3px; }
.m-x { background: none; border: none; color: var(--ink3); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
.m-x:hover { color: var(--ink); }

.m-body { padding: 18px 24px; }
.m-lbl  { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; margin-top: 16px; }
.m-lbl:first-child { margin-top: 0; }

.m-row  { display: flex; gap: 7px; margin-bottom: 6px; }
.m-inp  {
  flex: 1; background: var(--bg3); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--ink);
  outline: none; transition: border-color 0.15s;
}
.m-inp::placeholder { color: var(--ink4); }
.m-inp:focus { border-color: var(--ink2); background: var(--white); }
.m-add { background: var(--black); border: none; border-radius: 8px; color: #fff; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: opacity 0.15s; }
.m-add:hover { opacity: 0.8; }

.m-tasks { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
.m-trow {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--bg3); border-radius: 8px;
  font-size: 14px; font-weight: 600; color: #111;
  transition: background 0.2s;
}
.m-trow.done-row { background: #F5F5F5; }
.m-chk {
  width: 18px; height: 18px; border: 2px solid #555; border-radius: 4px;
  flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.m-chk:hover { border-color: #111; }
.m-chk.done { background: #111; border-color: #111; }
.m-chk.done::after { content: '✓'; font-size: 11px; color: #fff; }
.m-ttxt { flex: 1; transition: all 0.2s; }
.m-ttxt.done { text-decoration: line-through; color: var(--ink4); font-weight: 400; }
.m-del { background: none; border: none; color: var(--ink4); font-size: 16px; cursor: pointer; opacity: 0; transition: all 0.15s; padding: 0 2px; }
.m-trow:hover .m-del { opacity: 1; }
.m-del:hover { color: #C00; }

.m-ta {
  width: 100%; background: var(--bg3); border: 1px solid var(--line);
  border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--ink2);
  outline: none; resize: none; height: 68px; transition: border-color 0.15s;
}
.m-ta::placeholder { color: var(--ink4); }
.m-ta:focus { border-color: var(--ink2); background: var(--white); }

/* roulette */
.rou-box {
  background: var(--bg3); border: 1px solid var(--line2);
  border-radius: 10px; padding: 14px 16px; margin-top: 4px;
}
.rou-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.rou-title { font-size: 12px; color: var(--ink2); }
.rou-btn {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 20px; padding: 4px 14px; font-size: 11px; color: var(--ink2);
  cursor: pointer; transition: all 0.2s;
}
.rou-btn:hover { border-color: var(--ink); color: var(--ink); }
.rou-btn:disabled { opacity: 0.4; }
.rou-res { font-size: 13px; font-weight: 600; color: var(--ink); text-align: center; min-height: 20px; padding: 3px 0; }
.rou-add { display: none; width: 100%; margin-top: 6px; background: var(--black); border: none; border-radius: 7px; color: #fff; padding: 7px; font-size: 12px; cursor: pointer; transition: opacity 0.15s; }
.rou-add:hover { opacity: 0.8; }
.rou-add.show { display: block; }

.m-foot {
  padding: 14px 24px 22px;
  border-top: 1px solid var(--line2);
  display: flex; justify-content: space-between; align-items: center;
}
.m-clear { background: none; border: 1px solid var(--line); border-radius: 8px; color: var(--ink3); padding: 9px 16px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.m-clear:hover { border-color: #C00; color: #C00; }
.m-save  { background: var(--black); border: none; border-radius: 8px; color: #fff; padding: 10px 26px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.m-save:hover { opacity: 0.8; }

/* ═══════════════════════════════════════
   HOROSCOPE PAGE
═══════════════════════════════════════ */
.horo-page { padding: 32px; max-width: 900px; margin: 0 auto; }

.horo-top-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.page-title { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
.page-subtitle { font-size: 13px; color: var(--ink3); margin-top: 4px; }

.sign-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}
.sign-card {
  background: var(--white); border: 1px solid var(--line2);
  border-radius: 12px; padding: 14px 8px 10px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; gap: 4px; align-items: center;
}
.sign-card:hover { border-color: var(--ink2); }
.sign-card.active { border-color: var(--black); border-width: 2px; }
.sign-ico { font-size: 24px; line-height: 1; }
.sign-nm  { font-size: 11px; font-weight: 600; color: var(--ink2); }
.sign-en  { font-size: 9px; color: var(--ink3); letter-spacing: 0.04em; }

.horo-result {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 16px; overflow: hidden;
  animation: fadeSlide 0.3s ease;
}
@keyframes fadeSlide {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: none; }
}
.horo-result-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--line2);
  display: flex; align-items: center; gap: 18px;
}
.horo-big-sign {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px; flex-shrink: 0;
}
.horo-title-block { flex: 1; }
.horo-sign-title { font-size: 22px; font-weight: 800; color: var(--ink); }
.horo-sign-sub   { font-size: 12px; color: var(--ink3); margin-top: 3px; }
.horo-sign-date  { font-size: 11px; color: var(--ink4); margin-top: 2px; }
.horo-score-box  { text-align: center; flex-shrink: 0; }
.horo-overall-num { font-size: 42px; font-weight: 800; color: var(--ink); line-height: 1; }
.horo-pct-sym    { font-size: 20px; font-weight: 400; }
.horo-overall-lbl { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.horo-stars      { font-size: 14px; color: #F0A500; margin-top: 4px; letter-spacing: 2px; }

.horo-result-body { padding: 22px 28px 24px; display: flex; flex-direction: column; gap: 18px; }
.horo-section-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
.horo-msg-box  { background: var(--bg3); border-radius: 10px; padding: 16px 18px; }
.horo-msg      { font-size: 14px; color: var(--ink2); line-height: 1.85; }
.horo-advice-box { background: #FFFBF0; border: 1px solid #F0E8C0; border-radius: 10px; padding: 14px 18px; }
.horo-advice   { font-size: 13px; color: var(--ink2); line-height: 1.7; }

.horo-lucky-row {
  display: flex; gap: 0; flex-wrap: wrap;
  background: var(--bg3); border-radius: 12px; overflow: hidden;
  margin-top: 20px;
}
.horo-lucky-item {
  flex: 1; min-width: 110px;
  padding: 14px 16px;
  border-right: 1px solid var(--line2);
  display: flex; flex-direction: column; gap: 4px;
}
.horo-lucky-item:last-child { border-right: none; }
.horo-lucky-item .lucky-ico { font-size: 18px; }
.horo-lucky-item span { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.05em; }
.horo-lucky-item b { font-size: 14px; font-weight: 700; color: var(--ink); }

.horo-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.hb-item {}
.hb-lbl  { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink2); margin-bottom: 7px; font-weight: 500; }
.hb-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.hb-fill  { height: 100%; border-radius: 3px; transition: width 0.9s ease; }

.horo-empty {
  padding: 60px 28px; text-align: center;
  font-size: 16px; font-weight: 600; color: var(--ink2);
  line-height: 2;
}

/* diary search bar */
.diary-search-wrap {
  position: relative; display: flex; align-items: center;
}
.diary-search {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px;
  color: var(--ink); outline: none; transition: border-color 0.15s;
  font-family: inherit; width: 180px;
}
.diary-search:focus { border-color: var(--ink2); }
.diary-search::placeholder { color: var(--ink4); }
.diary-search-result-badge {
  position: absolute; right: 8px;
  font-size: 10px; color: var(--ink3); white-space: nowrap;
}
.diary-date-search {
  background: var(--white); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 10px; font-size: 12px;
  color: var(--ink); outline: none; cursor: pointer;
  font-family: inherit;
}
.diary-date-search:focus { border-color: var(--ink2); outline: none; }

tr.search-hidden { display: none; }
tr.search-match td { background: #fefbe8; }

/* ═══════════════════════════════════════
   DIARY PAGE
═══════════════════════════════════════ */
.diary-page { padding: 32px; max-width: 960px; margin: 0 auto; }

.diary-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}

.diary-table-wrap {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
}

.diary-table {
  width: 100%;
  border-collapse: collapse;
}

.diary-table th {
  padding: 12px 16px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink3); text-align: left;
  border-bottom: 1px solid var(--line);
  background: var(--bg3);
  white-space: nowrap;
}
.diary-table th:first-child { width: 90px; }

.diary-table td {
  padding: 0;
  border-bottom: 1px solid var(--line2);
  vertical-align: top;
}
.diary-table tr:last-child td { border-bottom: none; }

.diary-date-cell {
  padding: 14px 16px;
  border-right: 1px solid var(--line2);
  min-width: 90px;
}
.d-wd  { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); }
.d-num { font-size: 22px; font-weight: 700; color: var(--ink2); line-height: 1; margin-top: 2px; }
.d-month { font-size: 10px; color: var(--ink3); margin-top: 1px; }
.diary-table tr.today-row .d-wd  { color: var(--black); }
.diary-table tr.today-row .d-num { color: var(--black); }
.diary-table tr.today-row .diary-date-cell { background: var(--bg3); }

.diary-entry-cell {
  padding: 10px 12px;
  width: 100%;
}

.diary-ta {
  width: 100%; min-height: 72px;
  background: transparent; border: none; outline: none; resize: none;
  font-size: 13px; color: var(--ink2); line-height: 1.75;
  font-family: inherit;
}
.diary-ta::placeholder { color: var(--ink4); }

.diary-mood {
  display: flex; gap: 4px; margin-top: 6px;
}
.mood-btn {
  background: none; border: 1px solid var(--line2); border-radius: 20px;
  padding: 2px 10px; font-size: 12px; cursor: pointer; color: var(--ink3);
  transition: all 0.15s; line-height: 1.6;
}

// ─── State ─────────────────────────────────────────────
let store = JSON.parse(localStorage.getItem('wq_v1') || '{}');
let diaryStore = JSON.parse(localStorage.getItem('wq_diary') || '{}');
let weekStart = getMonday(new Date());
let diaryMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let editing = null;
let mTasks = [], mNote = '', rouLast = '';
let selectedSign = localStorage.getItem('wq_sign') || '';

function save()      { localStorage.setItem('wq_v1', JSON.stringify(store)); }
function saveDiary() { localStorage.setItem('wq_diary', JSON.stringify(diaryStore)); }

function getMonday(d) {
  const c = new Date(d); c.setHours(0,0,0,0);
  const day = c.getDay();
  c.setDate(c.getDate() - (day === 0 ? 6 : day - 1));
  return c;
}
function dk(d)  { return d.toISOString().slice(0,10); }
function bk(dateKey, si) { return dateKey + '_' + si; }
function getB(dateKey, si) { return store[bk(dateKey,si)] || {tasks:[], note:''}; }
function setB(dateKey, si, v) { store[bk(dateKey,si)] = v; save(); }
function weekDates() {
  return Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pad(n){ return String(n).padStart(2,'0'); }

// ─── Page switching ─────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('weekNav').style.display = name==='planner' ? '' : 'none';
  if (name === 'horoscope') buildHoroPage();
  if (name === 'diary') buildDiary();
}

// ─── Build planner ──────────────────────────────────────
function build() {
  const dates   = weekDates();
  const todayKey = dk(new Date());

  // week label
  const [s,e] = [dates[0], dates[6]];
  document.getElementById('weekLabel').textContent =
    `${MONTHS[s.getMonth()].slice(0,3)} ${s.getDate()} – ${MONTHS[e.getMonth()].slice(0,3)} ${e.getDate()}`;

  // day headers
  const dh = document.getElementById('dayHeaders');
  dh.innerHTML = '<div class="dh-spacer"></div>';
  dates.forEach(d => {
    const isT = dk(d) === todayKey;
    const el = document.createElement('div');
    el.className = 'day-head' + (isT?' is-today':'');
    el.innerHTML = `<div class="day-wd">${DAYS_EN[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      ${isT ? '<div class="today-pip"></div>' : ''}`;
    dh.appendChild(el);
  });

  // grid
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  SLOTS.forEach(slot => {
    const si = slot.si;
    const lbl = document.createElement('div');
    lbl.className = 'row-lbl';
    const nameLines = slot.name.split('\n').map(l => `<div class="rl-name">${l}</div>`).join('');
    lbl.innerHTML = nameLines + `<div class="rl-time">${slot.time}</div>`;
    grid.appendChild(lbl);

    dates.forEach(d => {
      const dkey = dk(d);
      const blk  = getB(dkey, si);
      const hasTasks = blk.tasks.length > 0;
      const hasNote  = blk.note && blk.note.trim();
      const filled   = hasTasks || hasNote;
      const isT      = dkey === todayKey;

      const cell = document.createElement('div');
      cell.className = 'block' + (isT?' today-col':'') + (filled?' filled':'');
      cell.dataset.si = si;
      cell.onclick = () => openModal(dkey, si, d, slot);

      let html = '';
      if (hasTasks) {
        html += '<div class="b-tasks">';
        blk.tasks.slice(0,4).forEach((t,ti) => {
          html += `<div class="b-task">
            <div class="b-chk${t.done?' done':''}" onclick="inlineCheck(event,'${dkey}',${si},${ti})"></div>
            <div class="b-txt${t.done?' done':''}">${esc(t.text)}</div>
          </div>`;
        });
        if (blk.tasks.length > 4) html += `<div class="b-more">+${blk.tasks.length-4}개 더</div>`;
        html += '</div>';
      }
      if (hasNote) html += `<div class="b-note">${esc(blk.note.slice(0,55))}${blk.note.length>55?'…':''}</div>`;
      if (!filled) html += '<div class="b-empty">+ 클릭해서 추가</div>';
      cell.innerHTML = html;
      grid.appendChild(cell);
    });
  });
  updateStats();
}

function inlineCheck(e, dkey, si, ti) {
  e.stopPropagation();
  const b = getB(dkey, si);
  b.tasks[ti].done = !b.tasks[ti].done;
  setB(dkey, si, b); build();
}

function updateStats() {
  const dates = weekDates();
  let total=0, done=0, filled=0;
  dates.forEach(d => {
    SLOTS.forEach(s => {
      const b = getB(dk(d), s.si);
      if (b.tasks.length || b.note) filled++;
      total += b.tasks.length;
      done  += b.tasks.filter(t=>t.done).length;
    });
  });
  const taskPct  = total  ? Math.round(done/total*100) : 0;
  const blockPct = Math.round(filled/42*100);
  const weekPct  = Math.round((taskPct+blockPct)/2);
  const CIRC = 125.7;

  document.getElementById('s-done').textContent   = done;
  document.getElementById('s-filled').textContent = filled;
  document.getElementById('s-rate').textContent   = weekPct+'%';
  document.getElementById('r-task-pct').textContent  = taskPct+'%';
  document.getElementById('r-block-pct').textContent = blockPct+'%';
  document.getElementById('r-week-pct').textContent  = weekPct+'%';
  document.getElementById('r-task').style.strokeDashoffset  = CIRC*(1-taskPct/100);
  document.getElementById('r-block').style.strokeDashoffset = CIRC*(1-blockPct/100);
  document.getElementById('r-week').style.strokeDashoffset  = CIRC*(1-weekPct/100);
}

// ─── Block modal ────────────────────────────────────────
function openModal(dkey, si, d, slot) {
  editing = {dkey, si};
  const b = getB(dkey, si);
  mTasks  = JSON.parse(JSON.stringify(b.tasks||[]));
  mNote   = b.note || '';
  rouLast = '';
  document.getElementById('mBar').style.background = SLOT_COLORS_CSS[si];
  document.getElementById('mTitle').textContent = slot.name;
  document.getElementById('mSub').textContent   =
    `${DAYS_EN[d.getDay()]}, ${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()} · ${slot.time}`;
  document.getElementById('mNote').value = mNote;
  document.getElementById('newTask').value = '';
  document.getElementById('rouRes').textContent = '—';
  document.getElementById('rouAdd').style.display = 'none';
  renderMTasks();
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('newTask').focus(),80);
}

function renderMTasks() {
  const el = document.getElementById('mTasks');
  el.innerHTML = mTasks.length
    ? mTasks.map((t,i) => `<div class="m-trow${t.done?' done-row':''}">
        <div class="m-chk${t.done?' done':''}" onclick="toggleMTask(${i})"></div>
        <div class="m-ttxt${t.done?' done':''}">${esc(t.text)}</div>
        <button class="m-del" onclick="delMTask(${i})">×</button>
      </div>`).join('')
    : '<div style="font-size:12px;color:var(--ink3);padding:4px 2px">태스크가 없습니다</div>';
}

function addMTask() {
  const v = document.getElementById('newTask').value.trim();
  if (!v) return;
  mTasks.push({text:v,done:false});
  document.getElementById('newTask').value = '';
  renderMTasks();
  document.getElementById('newTask').focus();
}
function toggleMTask(i) { mTasks[i].done=!mTasks[i].done; renderMTasks(); }
function delMTask(i)    { mTasks.splice(i,1); renderMTasks(); }
function saveBlock() {
  if (!editing) return;
  setB(editing.dkey, editing.si, {tasks:mTasks, note:document.getElementById('mNote').value.trim()});
  closeModal(); build();
}
function clearBlock() {
  if (!editing||!confirm('이 블록을 초기화할까요?')) return;
  setB(editing.dkey, editing.si, {tasks:[],note:''});
  closeModal(); build();
}
function closeModal()  { document.getElementById('modalBg').classList.remove('open'); editing=null; }
function bgClose(e)    { if(e.target===document.getElementById('modalBg')) closeModal(); }

function spinRou() {
  if (!editing) return;
  const pool = ROU_POOL[editing.si]||ROU_POOL[0];
  const btn  = document.getElementById('rouBtn');
  btn.disabled = true;
  let tick = 0;
  const el = document.getElementById('rouRes');
  const iv = setInterval(()=>{
    el.textContent = pool[Math.floor(Math.random()*pool.length)];
    tick++;
    if (tick>14) {
      clearInterval(iv);
      rouLast = pool[Math.floor(Math.random()*pool.length)];
      el.textContent = '→ ' + rouLast;
      document.getElementById('rouAdd').style.display = 'block';
      btn.disabled = false; btn.textContent = '▶ 다시';
    }
  }, 70);
}
function addRouTask() {
  if (!rouLast) return;
  mTasks.push({text:rouLast,done:false});
  renderMTasks();
  document.getElementById('rouAdd').style.display = 'none';
  document.getElementById('rouRes').textContent = '추가됐습니다 ✓';
  rouLast = '';
}

// ─── Week nav ───────────────────────────────────────────
function shiftWeek(n) { weekStart.setDate(weekStart.getDate()+n*7); build(); }
function goToday()    { weekStart=getMonday(new Date()); build(); }

// ─── Horoscope ──────────────────────────────────────────

  document.getElementById('horoDate').textContent =
    `${DAYS_EN[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  const grid = document.getElementById('signGrid');
  grid.innerHTML = SIGNS.map(s=>`
    <div class="sign-card${selectedSign===s.en?' active':''}" onclick="selectSign('${s.en}')">
      <div class="sign-ico">${s.ico}</div>
      <div class="sign-nm">${s.ko}</div>
      <div class="sign-en">${s.en}</div>
    </div>`).join('');

  if (selectedSign) renderHoroResult();
}

function selectSign(en) {
  selectedSign = en;
  localStorage.setItem('wq_sign', en);
  document.querySelectorAll('.sign-card').forEach(c =>
    c.classList.toggle('active', c.querySelector('.sign-en').textContent === en));
  renderHoroResult();
}

      </div>
    </div>
    <div class="horo-result-body">
      <div class="horo-msg-box">
        <div class="horo-section-lbl">✨ 오늘의 메시지</div>
        <div class="horo-msg">${msg}</div>
      </div>
      <div class="horo-advice-box">
        <div class="horo-section-lbl">💡 오늘의 조언</div>
        <div class="horo-advice">${advice}</div>
      </div>
      <div class="horo-bars">
        <div class="hb-item">
          <div class="hb-lbl"><span>💕 애정운</span><span>${love}%</span></div>
          <div class="hb-track"><div class="hb-fill" style="width:${love}%;background:#E8748A"></div></div>
        </div>
        <div class="hb-item">
          <div class="hb-lbl"><span>💼 업무운</span><span>${work}%</span></div>
          <div class="hb-track"><div class="hb-fill" style="width:${work}%;background:#5B8DEF"></div></div>
        </div>
        <div class="hb-item">
          <div class="hb-lbl"><span>🌿 건강운</span><span>${health}%</span></div>
          <div class="hb-track"><div class="hb-fill" style="width:${health}%;background:#4CAF82"></div></div>
        </div>
        <div class="hb-item">
          <div class="hb-lbl"><span>💰 금전운</span><span>${money}%</span></div>
          <div class="hb-track"><div class="hb-fill" style="width:${money}%;background:#F0A500"></div></div>
        </div>
      </div>
      <div class="horo-lucky-row">
        <div class="horo-lucky-item"><div class="lucky-ico">🎨</div><span>행운의 색</span><b>${luckyColor}</b></div>
        <div class="horo-lucky-item"><div class="lucky-ico">🔢</div><span>행운의 숫자</span><b>${luckyNum}</b></div>
        <div class="horo-lucky-item"><div class="lucky-ico">💎</div><span>수호 보석</span><b>${h.stone}</b></div>
        <div class="horo-lucky-item"><div class="lucky-ico">🪐</div><span>수호 행성</span><b>${h.planet}</b></div>
        <div class="horo-lucky-item"><div class="lucky-ico">📅</div><span>행운의 요일</span><b>${h.bestday}</b></div>

// ─── Diary ──────────────────────────────────────────────
function buildDiary() {
  const y = diaryMonth.getFullYear();
  const m = diaryMonth.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayKey = dk(new Date());

  document.getElementById('diaryMonthNav').textContent = `${MONTHS[m]} ${y}`;
  document.getElementById('diaryMonthLabel').textContent = `${y}년 ${m+1}월`;

  const tbody = document.getElementById('diaryBody');
  tbody.innerHTML = '';

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(y, m, day);
    const dkey = dk(date);
    const isToday = dkey === todayKey;
    const entry   = diaryStore[dkey] || {text:'', mood:''};

    const tr = document.createElement('tr');
    tr.dataset.dkey = dkey;
    if (isToday) tr.className = 'today-row';

    const moods = ['😊','😐','😔','🔥','😴'];
    const moodBtns = moods.map(mood =>
      `<button class="mood-btn${entry.mood===mood?' active':''}" onclick="setMood('${dkey}','${mood}',this)">${mood}</button>`
    ).join('');

    tr.innerHTML = `
      <td>
        <div class="diary-date-cell">
          <div class="d-wd">${DAYS_EN[date.getDay()]}</div>
          <div class="d-num">${day}</div>
          <div class="d-month">${MONTHS[m].slice(0,3)}</div>
        </div>
      </td>
      <td>
        <div class="diary-entry-cell">
          <textarea class="diary-ta" placeholder="오늘 하루를 기록해보세요…"
            oninput="saveDiaryEntry('${dkey}',this.value)">${esc(entry.text)}</textarea>
          <div class="diary-mood">${moodBtns}</div>
        </div>
      </td>`;
    tbody.appendChild(tr);
  }
}

function saveDiaryEntry(dkey, text) {
  if (!diaryStore[dkey]) diaryStore[dkey] = {text:'', mood:''};
  diaryStore[dkey].text = text;
  saveDiary();
}

function setMood(dkey, mood, btn) {
  if (!diaryStore[dkey]) diaryStore[dkey] = {text:'', mood:''};
  const same = diaryStore[dkey].mood === mood;
  diaryStore[dkey].mood = same ? '' : mood;
  saveDiary();
  // toggle buttons in this row
  btn.closest('.diary-mood').querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  if (!same) btn.classList.add('active');
}

function jumpToDate(val) {
  if (!val) return;
  const d = new Date(val);
  diaryMonth = new Date(d.getFullYear(), d.getMonth(), 1);
  buildDiary();
  // scroll to that row
  setTimeout(() => {
    const row = document.querySelector(`[data-dkey="${val}"]`);
    if (row) {
      row.scrollIntoView({behavior:'smooth', block:'center'});
      row.classList.add('highlight-row');
      setTimeout(()=>row.classList.remove('highlight-row'), 1800);
    }
  }, 80);
}

function shiftDiaryMonth(n) {
  diaryMonth.setMonth(diaryMonth.getMonth()+n);
  const s = document.getElementById('diarySearch');
  if (s) s.value = '';
  const b = document.getElementById('diarySearchBadge');
  if (b) { b.style.display='none'; b.textContent=''; }
  buildDiary();
}

function searchDiary(q) {
  const badge = document.getElementById('diarySearchBadge');
  q = q.trim().toLowerCase();
  if (!q) {
    document.querySelectorAll('#diaryBody tr').forEach(tr => {
      tr.classList.remove('search-hidden','search-match');
    });
    badge.style.display = 'none';
    return;
  }
  let matches = 0;
  document.querySelectorAll('#diaryBody tr').forEach(tr => {
    const dkey   = tr.dataset.dkey || '';
    const entry  = diaryStore[dkey] || {text:''};
    const dateEl = tr.querySelector('.d-wd,.d-num,.d-month');
    const fullDate = (tr.querySelector('.d-wd')?.textContent||'') + ' ' +
                     (tr.querySelector('.d-num')?.textContent||'') + ' ' +
                     (tr.querySelector('.d-month')?.textContent||'');
    const textMatch = entry.text.toLowerCase().includes(q);
    const dateMatch = fullDate.toLowerCase().includes(q) || dkey.includes(q);
    if (textMatch || dateMatch) {
      tr.classList.remove('search-hidden');
      tr.classList.add('search-match');
      matches++;
    } else {
      tr.classList.add('search-hidden');
      tr.classList.remove('search-match');
    }
  });
  badge.textContent = matches ? `${matches}건` : '없음';
  badge.style.display = 'block';
}

// ─── Init ────────────────────────────────────────────────
document.getElementById('weekNav').style.display = '';
build();
</script>
